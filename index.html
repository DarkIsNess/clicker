<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Capybara: Evolution</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #ffcc00; --bg: #0a0a0a; --neon: #00e5ff; --danger: #ff4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; overflow: hidden; touch-action: none; }
        
        /* Эффекты фона */
        .stars { position: absolute; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000 100%); z-index: -1; }

        .header { padding: 15px; text-align: center; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); }
        #balance { font-size: 3em; font-weight: 900; color: var(--gold); text-shadow: 0 0 20px rgba(255,204,0,0.3); }
        
        /* Шкала Комбо */
        .combo-box { width: 85%; margin: 10px auto; }
        .combo-bar { width: 100%; height: 12px; background: #222; border-radius: 6px; overflow: hidden; border: 1px solid #333; }
        #combo-fill { width: 0%; height: 100%; background: var(--neon); transition: width 0.1s linear; }
        #combo-fill.max { background: var(--danger); box-shadow: 0 0 15px var(--danger); }
        #combo-info { display: flex; justify-content: space-between; font-weight: bold; font-size: 0.8em; margin-top: 5px; }

        /* Игровая зона */
        .game-area { height: 50vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #capy-btn { 
            width: 240px; height: 240px; border-radius: 50%; background: #3d2b1f; border: 8px solid #222;
            font-size: 100px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.5); transition: 0.05s; -webkit-tap-highlight-color: transparent;
        }
        #capy-btn::after { content: '🦫'; }

        /* Навигация */
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #111; padding: 10px 0; border-top: 1px solid #333; }
        .nav-btn { flex: 1; font-size: 1.5em; opacity: 0.5; transition: 0.3s; cursor: pointer; }
        .nav-btn.active { opacity: 1; transform: scale(1.2); color: var(--gold); }

        /* Модалки */
        .page { position: fixed; top: 0; left: 0; width: 100%; height: 90vh; background: var(--bg); transform: translateY(100%); transition: 0.4s; padding: 20px; box-sizing: border-box; overflow-y: auto; z-index: 100; }
        .page.active { transform: translateY(0); }
        .card { background: #161616; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
        .buy-btn { background: var(--gold); border: none; padding: 10px 15px; border-radius: 10px; font-weight: bold; }
        
        /* Лидеры */
        .leader-row { display: flex; align-items: center; gap: 15px; padding: 12px; border-bottom: 1px solid #222; }
        .avatar { width: 40px; height: 40px; background: #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        .floating { position: absolute; pointer-events: none; animation: up 0.8s forwards; font-weight: 900; font-size: 2em; }
        @keyframes up { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-150px); } }
    </style>
</head>
<body>
    <div class="stars"></div>
    <div class="header">
        <div id="balance">0</div>
        <div class="combo-box">
            <div id="combo-info"><span id="combo-text">COMBO X1</span> <span id="max-label" style="display:none; color:var(--danger)">MAX!</span></div>
            <div class="combo-bar"><div id="combo-fill"></div></div>
        </div>
        <div style="font-size: 0.8em; opacity: 0.6;">Авто-доход: +<span id="pps">0</span>/сек</div>
    </div>

    <div class="game-area">
        <div id="capy-btn"></div>
    </div>

    <div id="p-shop" class="page">
        <h2>🏪 Магазин (30 апгрейдов)</h2>
        <div id="shop-items"></div>
    </div>

    <div id="p-ranks" class="page">
        <h2>🏆 Топ Капибар</h2>
        <div id="leaderboard">Загрузка...</div>
    </div>

    <div id="p-settings" class="page">
        <h2>⚙️ Настройки</h2>
        <button onclick="resetGame()" style="width:100%; padding:20px; background:var(--danger); border:none; color:white; border-radius:15px; font-weight:bold;">СБРОСИТЬ ВЕСЬ ПРОГРЕСС</button>
        <p style="margin-top:20px; opacity:0.5; font-size:0.8em;">Capybara Evolution v2.0<br>Tecno Camon 20 Optimized</p>
    </div>

    <div class="nav">
        <div class="nav-btn active" onclick="showPage('main', this)">🏠</div>
        <div class="nav-btn" onclick="showPage('p-shop', this)">🛒</div>
        <div class="nav-btn" onclick="showPage('p-ranks', this)">🏆</div>
        <div class="nav-btn" onclick="showPage('p-settings', this)">⚙️</div>
    </div>

<script>
    const web = window.Telegram.WebApp;
    web.expand();

    let data = {
        bal: 0, click: 1, auto: 0, combo: 1, cFill: 0, last: Date.now(), upgrades: []
    };

    // Генерируем 30 улучшений
    const upgradeList = [];
    for(let i=1; i<=30; i++) {
        upgradeList.push({
            id: i,
            name: i <= 15 ? `Улучшение клика #${i}` : `Авто-ферма #${i-15}`,
            type: i <= 15 ? 'click' : 'auto',
            power: i * 2,
            cost: Math.floor(50 * Math.pow(1.5, i))
        });
    }

    function load() {
        const s = localStorage.getItem('capy_v2');
        if(s) {
            data = JSON.parse(s);
            const offTime = Math.floor((Date.now() - data.last) / 1000);
            if(offTime > 5 && data.auto > 0) {
                const earned = offTime * data.auto;
                data.bal += earned;
                web.showAlert(`Пока тебя не было, капибары принесли ${earned} 💰!`);
            }
        }
        renderShop();
        loop();
    }

    function save() {
        data.last = Date.now();
        localStorage.setItem('capy_v2', JSON.stringify(data));
        sync();
    }

    function sync() {
        fetch('/api/sync', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ user: web.initDataUnsafe.user, balance: data.bal })
        }).then(r => r.json()).then(res => {
            const list = document.getElementById('leaderboard');
            list.innerHTML = res.leaderboard.map((u, i) => `
                <div class="leader-row">
                    <div class="avatar">${i+1}</div>
                    <div style="flex:1"><b>${u.name}</b></div>
                    <div style="color:var(--gold)">${Math.floor(u.balance)}</div>
                </div>
            `).join('');
        });
    }

    const btn = document.getElementById('capy-btn');
    const handle = (e) => {
        const ts = e.changedTouches ? e.changedTouches : [e];
        for(let t of ts) {
            const p = data.click * data.combo;
            data.bal += p;
            spawn(t.clientX, t.clientY, `+${Math.floor(p)}`);
            
            // Заполнение комбо (сложнее на высоких уровнях)
            const difficulty = data.combo * 2;
            data.cFill = Math.min(data.cFill + (15 / difficulty), 100);
            
            if(data.cFill >= 100 && data.combo < 50) {
                data.combo++;
                data.cFill = 10;
            }
        }
        btn.style.transform = 'scale(0.9)';
        setTimeout(()=>btn.style.transform='scale(1)', 50);
        update();
    };

    btn.addEventListener('touchstart', (e)=>{e.preventDefault(); handle(e);}, {passive:false});
    btn.addEventListener('mousedown', handle);

    function loop() {
        if(data.cFill > 0) data.cFill -= 0.4;
        else if(data.combo > 1) { data.combo--; data.cFill = 80; }
        
        if(data.auto > 0) data.bal += (data.auto / 10);
        update();
        setTimeout(loop, 100);
    }

    function update() {
        document.getElementById('balance').innerText = Math.floor(data.bal);
        document.getElementById('pps').innerText = data.auto;
        document.getElementById('combo-text').innerText = `COMBO X${data.combo}`;
        const f = document.getElementById('combo-fill');
        f.style.width = data.cFill + '%';
        
        const max = document.getElementById('max-label');
        if(data.combo >= 50) { f.classList.add('max'); max.style.display = 'block'; }
        else { f.classList.remove('max'); max.style.display = 'none'; }
    }

    function renderShop() {
        const container = document.getElementById('shop-items');
        container.innerHTML = upgradeList.map(u => `
            <div class="card">
                <div><b>${u.name}</b><br><small>+${u.power} к ${u.type === 'click' ? 'клику' : 'доходу'}</small></div>
                <button class="buy-btn" onclick="buy(${u.id})">${u.cost} 💰</button>
            </div>
        `).join('');
    }

    function buy(id) {
        const u = upgradeList.find(x => x.id === id);
        if(data.bal >= u.cost) {
            data.bal -= u.cost;
            if(u.type === 'click') data.click += u.power;
            else data.auto += u.power;
            u.cost = Math.floor(u.cost * 1.6);
            renderShop();
            web.HapticFeedback.notificationOccurred('success');
            save();
        } else {
            web.showAlert('Мало денег!');
        }
    }

    function showPage(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        if(id !== 'main') document.getElementById(id).classList.add('active');
        el.classList.add('active');
        save();
    }

    function spawn(x, y, t) {
        const d = document.createElement('div');
        d.className = 'floating';
        d.style.left = x + 'px'; d.style.top = y + 'px';
        d.innerText = t; d.style.color = data.combo > 10 ? 'var(--neon)' : 'white';
        document.body.appendChild(d);
        setTimeout(()=>d.remove(), 800);
    }

    function resetGame() {
        if(confirm('РЕАЛЬНО СБРОСИТЬ ВСЁ?')) {
            localStorage.clear();
            location.reload();
        }
    }

    load();
</script>
</body>
</html>
