<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Capybara Clicker: Ultimate</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --main-color: #ffcc00; --bg: #121212; --accent: #00e5ff; }
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: white; 
            margin: 0; overflow: hidden; touch-action: none; user-select: none;
        }
        
        /* Хедер */
        .header { padding: 20px; background: rgba(255,255,255,0.05); border-bottom: 2px solid #333; text-align: center; }
        #balance { font-size: 3.5em; font-weight: 900; color: var(--main-color); margin: 0; }
        .combo-container { width: 80%; height: 10px; background: #333; margin: 10px auto; border-radius: 5px; overflow: hidden; }
        #combo-fill { width: 0%; height: 100%; background: var(--accent); transition: width 0.1s linear; box-shadow: 0 0 15px var(--accent); }
        #combo-text { font-size: 1em; color: var(--accent); font-weight: bold; margin-bottom: 5px; }

        /* Игровая зона */
        .game-area { height: 55vh; display: flex; align-items: center; justify-content: center; position: relative; }
        #click-btn { 
            width: 230px; height: 230px; border-radius: 50%; border: 10px solid #222;
            background: #3d2b1f; box-shadow: 0 0 50px rgba(0,0,0,0.8);
            font-size: 110px; cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: transform 0.05s; z-index: 5; outline: none; -webkit-tap-highlight-color: transparent;
        }
        #click-btn::after { content: '🦫'; }

        /* Нижнее меню */
        .nav-bar { display: flex; justify-content: space-around; background: #1a1a1a; padding: 15px 0; position: fixed; bottom: 0; width: 100%; border-top: 1px solid #333; z-index: 200; }
        .nav-item { font-size: 1.8em; cursor: pointer; filter: grayscale(1); transition: 0.3s; padding: 5px 20px; }
        .nav-item.active { filter: grayscale(0); transform: scale(1.2); border-bottom: 3px solid var(--main-color); }

        /* Окна (Модалки) */
        .modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 88vh; 
            background: var(--bg); z-index: 100; transform: translateY(100%);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 25px; box-sizing: border-box;
            overflow-y: auto;
        }
        .modal.open { transform: translateY(0); }
        .close-btn { position: absolute; top: 20px; right: 20px; font-size: 2em; color: #ff4444; cursor: pointer; }

        h2 { border-bottom: 2px solid #333; padding-bottom: 10px; margin-top: 0; }

        /* Элементы магазина */
        .shop-item { 
            background: #1e1e1e; padding: 18px; border-radius: 18px; margin-bottom: 15px;
            display: flex; justify-content: space-between; align-items: center; border: 1px solid #333;
        }
        .shop-info h4 { margin: 0; color: var(--main-color); font-size: 1.1em; }
        .shop-info p { margin: 5px 0 0; font-size: 0.85em; opacity: 0.6; }
        .buy-btn { background: var(--main-color); color: black; border: none; padding: 12px 18px; border-radius: 12px; font-weight: bold; font-size: 0.9em; }
        .buy-btn:active { opacity: 0.7; }

        /* Лидеры */
        .leader-item { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #222; font-size: 1.1em; }

        /* Вылетающие цифры */
        .floating-text { position: absolute; font-weight: 900; pointer-events: none; animation: float 0.8s ease-out forwards; z-index: 300; }
        @keyframes float { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-130px) scale(1.6); } }
    </style>
</head>
<body>

<div class="header">
    <div id="balance">0</div>
    <div id="combo-text">COMBO X1</div>
    <div class="combo-container"><div id="combo-fill"></div></div>
    <div style="font-size: 0.9em; color: #888;">💰 В секунду: +<span id="auto-val">0</span></div>
</div>

<div class="game-area">
    <button id="click-btn"></button>
</div>

<div id="shop-modal" class="modal">
    <div class="close-btn" onclick="toggleModal('main')">✖</div>
    <h2>🏪 МАГАЗИН</h2>
    <div id="shop-list">
        <div class="shop-item">
            <div class="shop-info"><h4>Медиум клик</h4><p>+5 к силе нажатия</p></div>
            <button class="buy-btn" onclick="buy('click', 5, 250)">250 💰</button>
        </div>
        <div class="shop-item">
            <div class="shop-info"><h4>Супер клик</h4><p>+100 к силе нажатия</p></div>
            <button class="buy-btn" onclick="buy('click', 100, 5000)">5000 💰</button>
        </div>
        <div class="shop-item">
            <div class="shop-info"><h4>Авто-лапа</h4><p>+1 монета/сек автоматически</p></div>
            <button class="buy-btn" onclick="buy('auto', 1, 100)">100 💰</button>
        </div>
        <div class="shop-item">
            <div class="shop-info"><h4>Ферма Капибар</h4><p>+15 монет/сек автоматически</p></div>
            <button class="buy-btn" onclick="buy('auto', 15, 1200)">1200 💰</button>
        </div>
    </div>
</div>

<div id="leader-modal" class="modal">
    <div class="close-btn" onclick="toggleModal('main')">✖</div>
    <h2>🏆 ЛИДЕРЫ</h2>
    <div id="leader-list">
        <div class="leader-item"><span>🥇 High Command</span><span style="color:var(--main-color)">999,999</span></div>
        <div class="leader-item"><span>🥈 CapyBro</span><span>75,200</span></div>
        <div class="leader-item"><span>🥉 TechnoUser</span><span>15,400</span></div>
        <div class="leader-item"><span>4. ClickMaster</span><span>8,100</span></div>
    </div>
</div>

<div class="nav-bar">
    <div class="nav-item active" id="nav-main" onclick="toggleModal('main')">🏠</div>
    <div class="nav-item" id="nav-shop" onclick="toggleModal('shop-modal')">🛒</div>
    <div class="nav-item" id="nav-leader" onclick="toggleModal('leader-modal')">🏆</div>
</div>

<script>
    const webapp = window.Telegram.WebApp;
    webapp.expand();

    // Начальное состояние
    let state = {
        balance: 0,
        clickPower: 1,
        autoIncome: 0,
        combo: 1,
        comboLevel: 0
    };

    // Загрузка сохраненных данных
    const saved = localStorage.getItem('capy_pro_data_final');
    if(saved) state = JSON.parse(saved);

    function updateUI() {
        document.getElementById('balance').innerText = Math.floor(state.balance);
        document.getElementById('auto-val').innerText = state.autoIncome;
        document.getElementById('combo-text').innerText = `COMBO X${state.combo}`;
        document.getElementById('combo-fill').style.width = state.comboLevel + '%';
        // Сохранение
        localStorage.setItem('capy_pro_data_final', JSON.stringify(state));
    }

    // ЛОГИКА ПЕРЕКЛЮЧЕНИЯ ОКОН
    function toggleModal(id) {
        // Закрываем всё
        document.querySelectorAll('.modal').forEach(m => m.classList.remove('open'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));

        if (id === 'main') {
            document.getElementById('nav-main').classList.add('active');
        } else {
            document.getElementById(id).classList.add('open');
            if (id === 'shop-modal') document.getElementById('nav-shop').classList.add('active');
            if (id === 'leader-modal') document.getElementById('nav-leader').classList.add('active');
        }
        if (webapp.HapticFeedback) webapp.HapticFeedback.impactOccurred('light');
    }

    // ОБРАБОТКА КЛИКА (МУЛЬТИТАЧ)
    const clickBtn = document.getElementById('click-btn');
    const handleAction = (e) => {
        const touches = e.changedTouches ? e.changedTouches : [e];
        
        for(let t of touches) {
            const reward = state.clickPower * state.combo;
            state.balance += reward;
            
            // Вылетающие цифры
            spawnText(t.clientX, t.clientY, `+${reward}`, state.combo > 1 ? 'var(--accent)' : 'white');
            
            // Зарядка комбо
            state.comboLevel = Math.min(state.comboLevel + 7, 100);
            if(state.comboLevel >= 100 && state.combo < 5) {
                state.combo += 1;
                state.comboLevel = 35;
            }
        }

        updateUI();
        if (webapp.HapticFeedback) webapp.HapticFeedback.impactOccurred('medium');
        
        // Анимация кнопки
        clickBtn.style.transform = 'scale(0.92)';
        setTimeout(() => clickBtn.style.transform = 'scale(1)', 50);
    };

    clickBtn.addEventListener('touchstart', (e) => { e.preventDefault(); handleAction(e); }, {passive: false});
    clickBtn.addEventListener('mousedown', handleAction);

    // Падение комбо со временем
    setInterval(() => {
        if(state.comboLevel > 0) {
            state.comboLevel -= 2.5; 
        } else if(state.combo > 1) {
            state.combo -= 1;
            state.comboLevel = 80;
        }
        updateUI();
    }, 150);

    // Автоклик раз в секунду
    setInterval(() => {
        if(state.autoIncome > 0) {
            state.balance += state.autoIncome;
            updateUI();
        }
    }, 1000);

    // Покупка в магазине
    function buy(type, val, cost) {
        if(state.balance >= cost) {
            state.balance -= cost;
            if(type === 'click') state.clickPower += val;
            if(type === 'auto') state.autoIncome += val;
            updateUI();
            if (webapp.HapticFeedback) webapp.HapticFeedback.notificationOccurred('success');
        } else {
            webapp.showAlert('Недостаточно монет для покупки!');
        }
    }

    // Создание текста клика
    function spawnText(x, y, txt, color) {
        const el = document.createElement('div');
        el.className = 'floating-text';
        el.innerText = txt;
        el.style.left = (x - 20) + 'px';
        el.style.top = (y - 40) + 'px';
        el.style.color = color;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 800);
    }

    updateUI();
</script>
</body>
</html>
