<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Capybara Clicker: COMBO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --main-color: #ffcc00; --bg: #121212; --accent: #00e5ff; }
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: white; 
            margin: 0; overflow: hidden; touch-action: none; user-select: none;
        }
        
        /* Хедер с балансом и Комбо */
        .header { padding: 20px; background: rgba(255,255,255,0.05); border-bottom: 2px solid #333; }
        #balance { font-size: 3.5em; font-weight: 900; color: var(--main-color); }
        .combo-container { width: 80%; height: 8px; background: #333; margin: 10px auto; border-radius: 4px; overflow: hidden; position: relative; }
        #combo-fill { width: 0%; height: 100%; background: var(--accent); transition: width 0.1s linear; box-shadow: 0 0 10px var(--accent); }
        #combo-text { font-size: 0.9em; color: var(--accent); font-weight: bold; }

        /* Игровое поле */
        .game-area { height: 50vh; display: flex; align-items: center; justify-content: center; position: relative; }
        #click-btn { 
            width: 220px; height: 220px; border-radius: 50%; border: 10px solid #222;
            background: #3d2b1f; box-shadow: 0 0 50px rgba(0,0,0,0.8);
            font-size: 110px; cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: transform 0.05s; z-index: 5;
        }
        #click-btn::after { content: '🦫'; }

        /* Меню (Табы) */
        .nav-bar { display: flex; justify-content: space-around; background: #1a1a1a; padding: 15px 0; position: fixed; bottom: 0; width: 100%; border-top: 1px solid #333; }
        .nav-item { font-size: 1.5em; cursor: pointer; filter: grayscale(1); transition: 0.3s; }
        .nav-item.active { filter: grayscale(0); transform: scale(1.2); }

        /* Окна (Магазин, Лидеры) */
        .modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 90vh; 
            background: var(--bg); z-index: 100; transform: translateY(100%);
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 20px; box-sizing: border-box;
            overflow-y: auto;
        }
        .modal.open { transform: translateY(0); }
        .close-btn { position: absolute; top: 20px; right: 20px; font-size: 2em; color: #ff4444; }

        .shop-item { 
            background: #1e1e1e; padding: 15px; border-radius: 15px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center; border: 1px solid #333;
        }
        .shop-info h4 { margin: 0; color: var(--main-color); }
        .shop-info p { margin: 5px 0 0; font-size: 0.8em; opacity: 0.6; }
        .buy-btn { background: var(--main-color); color: black; border: none; padding: 10px 15px; border-radius: 10px; font-weight: bold; }

        .leader-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #222; }

        .floating-text { position: absolute; font-weight: 900; pointer-events: none; animation: float 0.8s ease-out forwards; z-index: 200; }
        @keyframes float { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-120px) scale(1.5); } }
    </style>
</head>
<body>

<div class="header">
    <div id="balance">0</div>
    <div id="combo-text">COMBO X1</div>
    <div class="combo-container"><div id="combo-fill"></div></div>
    <div style="font-size: 0.8em; opacity: 0.5;">💰 В сек: +<span id="auto-val">0</span></div>
</div>

<div class="game-area">
    <button id="click-btn"></button>
</div>

<div id="shop-modal" class="modal">
    <div class="close-btn" onclick="toggleModal('shop-modal')">✖</div>
    <h2>🏪 МАГАЗИН</h2>
    <div id="shop-list">
        <div class="shop-item">
            <div class="shop-info"><h4>Медиум клик</h4><p>+5 за клик</p></div>
            <button class="buy-btn" onclick="buy('click', 5, 250)">250 💰</button>
        </div>
        <div class="shop-item">
            <div class="shop-info"><h4>Супер клик</h4><p>+100 за клик</p></div>
            <button class="buy-btn" onclick="buy('click', 100, 5000)">5000 💰</button>
        </div>
        <div class="shop-item">
            <div class="shop-info"><h4>Авто-лапа</h4><p>+1 монета/сек</p></div>
            <button class="buy-btn" onclick="buy('auto', 1, 100)">100 💰</button>
        </div>
        <div class="shop-item">
            <div class="shop-info"><h4>Ферма Капибар</h4><p>+10 монет/сек</p></div>
            <button class="buy-btn" onclick="buy('auto', 10, 800)">800 💰</button>
        </div>
    </div>
</div>

<div id="leader-modal" class="modal">
    <div class="close-btn" onclick="toggleModal('leader-modal')">✖</div>
    <h2>🏆 ЛИДЕРЫ</h2>
    <div id="leader-list">
        <div class="leader-item"><span>🥇 High Command</span><span style="color:var(--main-color)">999,999</span></div>
        <div class="leader-item"><span>🥈 CapyBro</span><span>50,400</span></div>
        <div class="leader-item"><span>🥉 TechnoUser</span><span>12,000</span></div>
    </div>
</div>

<div class="nav-bar">
    <div class="nav-item active" onclick="toggleModal('main')">🏠</div>
    <div class="nav-item" onclick="toggleModal('shop-modal')">🛒</div>
    <div class="nav-item" onclick="toggleModal('leader-modal')">🏆</div>
</div>

<script>
    const webapp = window.Telegram.WebApp;
    webapp.expand();

    let state = {
        balance: 0,
        clickPower: 1,
        autoIncome: 0,
        combo: 1,
        comboLevel: 0,
        lastClick: 0
    };

    // Загрузка
    const saved = localStorage.getItem('capy_pro_data');
    if(saved) state = {...state, ...JSON.parse(saved)};

    function updateUI() {
        document.getElementById('balance').innerText = Math.floor(state.balance);
        document.getElementById('auto-val').innerText = state.autoIncome;
        document.getElementById('combo-text').innerText = `COMBO X${state.combo}`;
        document.getElementById('combo-fill').style.width = state.comboLevel + '%';
        localStorage.setItem('capy_pro_data', JSON.stringify(state));
    }

    // Логика клика
    const clickBtn = document.getElementById('click-btn');
    const handleAction = (e) => {
        const touches = e.changedTouches ? e.changedTouches : [e];
        for(let t of touches) {
            const reward = state.clickPower * state.combo;
            state.balance += reward;
            spawnText(t.clientX, t.clientY, `+${reward}`, state.combo > 1 ? 'var(--accent)' : 'white');
            
            // Зарядка комбо
            state.comboLevel = Math.min(state.comboLevel + 5, 100);
            if(state.comboLevel >= 100) {
                if(state.combo < 5) state.combo += 1;
                state.comboLevel = 20;
            }
        }
        clickBtn.style.transform = 'scale(0.95)';
        setTimeout(()=>clickBtn.style.transform='scale(1)', 50);
        updateUI();
        webapp.HapticFeedback.impactOccurred('medium');
    };

    clickBtn.addEventListener('touchstart', (e)=>{e.preventDefault(); handleAction(e);}, {passive:false});
    clickBtn.addEventListener('mousedown', handleAction);

    // Спад комбо
    setInterval(() => {
        if(state.comboLevel > 0) {
            state.comboLevel -= 2; 
        } else if(state.combo > 1) {
            state.combo -= 1;
            state.comboLevel = 80;
        }
        updateUI();
    }, 100);

    // Автоклик
    setInterval(() => {
        if(state.autoIncome > 0) {
            state.balance += state.autoIncome;
            updateUI();
        }
    }, 1000);

    function buy(type, val, cost) {
        if(state.balance >= cost) {
            state.balance -= cost;
            if(type === 'click') state.clickPower += val;
            if(type === 'auto') state.autoIncome += val;
            updateUI();
            webapp.showAlert('Успешно куплено!');
        } else {
            webapp.showAlert('Не хватает монет!');
        }
    }

    function toggleModal(id) {
        document.querySelectorAll('.modal').forEach(m => m.classList.remove('open'));
        if(id !== 'main') document.getElementById(id).classList.add('open');
        
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        // Простая логика подсветки табов
    }

    function spawnText(x, y, txt, color) {
        const el = document.createElement('div');
        el.className = 'floating-text';
        el.innerText = txt;
        el.style.left = x + 'px';
        el.style.top = y + 'px';
        el.style.color = color;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 800);
    }

    updateUI();
</script>
</body>
</html>
