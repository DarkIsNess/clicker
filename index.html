<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Capybara Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --neon: #00f2ff; --bg: #050505; --pink: #ff007a; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; overflow: hidden; touch-action: none; }
        .container { display: flex; flex-direction: column; align-items: center; justify-content: space-between; height: 100vh; padding: 20px; box-sizing: border-box; }
        #balance { font-size: 4em; font-weight: 900; color: #fff; margin-top: 10px; text-shadow: 0 0 10px rgba(0,242,255,0.3); }
        #capy-btn { 
            width: 210px; height: 210px; border-radius: 50%; border: 4px solid #333;
            background: #111; font-size: 100px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px var(--neon); animation: neonPulse 2s infinite; outline: none; -webkit-tap-highlight-color: transparent;
        }
        @keyframes neonPulse { 0% { box-shadow: 0 0 15px var(--neon); } 50% { box-shadow: 0 0 35px var(--neon); } 100% { box-shadow: 0 0 15px var(--neon); } }
        #capy-btn:active { transform: scale(0.94); }
        .energy-bar { width: 220px; height: 12px; background: #222; border-radius: 10px; margin-top: 15px; overflow: hidden; border: 1px solid #333; }
        #energy-fill { width: 100%; height: 100%; background: var(--neon); transition: 0.2s; }
        .nav { width: 100%; max-width: 400px; display: flex; background: #111; border-radius: 20px; padding: 5px; border: 1px solid #222; }
        .n-btn { flex: 1; text-align: center; font-size: 1.5em; opacity: 0.4; padding: 10px; }
        .n-btn.active { opacity: 1; color: var(--neon); }
        .modal { position: fixed; inset: 0; background: #000; display: none; flex-direction: column; padding: 20px; z-index: 1000; overflow-y: auto;}
        .modal.open { display: flex; }
        .card { background: #111; padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 1px solid #222; }
        input { width: 100%; padding: 12px; margin: 5px 0; background: #111; border: 1px solid #333; color: #fff; border-radius: 10px; box-sizing: border-box; }
        .buy-btn { background: #222; border: 1px solid #444; color: #fff; padding: 8px 12px; border-radius: 10px; font-weight: bold; }
        .del-btn { background: #420000; color: #ff5555; border: 1px solid #800; width: 100%; padding: 12px; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div style="text-align: center;">
        <div id="balance">0</div>
        <div style="color:#555; font-size: 0.9em;">AUTO: +<span id="pps">0</span>/SEC</div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center;">
        <button id="capy-btn">🦫</button>
        <div class="energy-bar"><div id="energy-fill"></div></div>
        <div style="font-size:0.7em; margin-top:5px; color:#555;"><span id="cur-e">0</span> / <span id="max-e">0</span></div>
    </div>
    <div class="nav">
        <div class="n-btn active" onclick="tab('main', this)">🏠</div>
        <div class="n-btn" onclick="tab('shop', this)">🛒</div>
        <div class="n-btn" onclick="tab('rank', this)">🏆</div>
        <div class="n-btn" onclick="tab('sets', this)">⚙️</div>
    </div>
</div>

<div id="shop" class="modal">
    <div style="display:flex; justify-content:space-between"><h2>SHOP</h2><h2 onclick="tab('main')">✕</h2></div>
    <div id="shop-list"></div>
</div>

<div id="rank" class="modal">
    <div style="display:flex; justify-content:space-between"><h2>TOP 10</h2><h2 onclick="tab('main')">✕</h2></div>
    <div id="leader-list"></div>
</div>

<div id="sets" class="modal">
    <div style="display:flex; justify-content:space-between"><h2>SETTINGS</h2><h2 onclick="tab('main')">✕</h2></div>
    <div class="card">
        <button class="buy-btn" style="width:100%" onclick="adminAuth()">ADMIN LOGIN</button>
        <div id="adm-panel" style="display:none; margin-top:15px;">
            <input type="number" id="adm-amt" placeholder="Give Money">
            <button class="buy-btn" style="width:100%; background:var(--neon); color:#000" onclick="sendMoney()">SEND</button>
            <hr style="border:0; border-top:1px solid #222; margin:15px 0;">
            <input type="number" id="gv-p" placeholder="Giveaway Prize">
            <input id="gv-d" type="datetime-local">
            <button class="buy-btn" style="width:100%" onclick="addGiveaway()">CREATE GIVEAWAY</button>
        </div>
        <button class="del-btn" style="margin-top:20px;" onclick="resetProgress()">УДАЛИТЬ ПРОГРЕСС</button>
    </div>
</div>

<script>
const tg = window.Telegram.WebApp;
const MY_ID = 6675992053;
let data = { bal: 0, click: 1, auto: 0, upCosts: {}, energy: 100, maxEnergy: 100 };
let upgrades = [];

for(let i=1; i<=10; i++) upgrades.push({ id: i, name: `Click v${i}`, type: 'click', power: i*2, cost: 500*i });
for(let i=11; i<=20; i++) upgrades.push({ id: i, name: `Auto v${i-10}`, type: 'auto', power: i, cost: 1000*(i-10) });

async function init() {
    tg.expand();
    const configRes = await fetch('/api/config');
    const config = await configRes.json();
    
    const syncRes = await fetch('/api/sync', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ userId: tg.initDataUnsafe.user.id, name: tg.initDataUnsafe.user.first_name, isInitial: true })
    });
    const cloud = await syncRes.json();
    data.bal = cloud.bal || 0;
    data.upCosts = cloud.upCosts || {};
    data.energy = cloud.energy || 100;
    data.maxEnergy = cloud.maxEnergy || 100;

    upgrades.forEach(u => {
        if(data.upCosts[u.id]) {
            let count = Math.round(Math.log(data.upCosts[u.id]/u.cost)/Math.log(1.6));
            if(u.type === 'click') data.click += (u.power * count);
            else data.auto += (u.power * count);
        }
    });

    document.getElementById('leader-list').innerHTML = config.leaders.map((l, i) => `
        <div class="card" style="display:flex; justify-content:space-between">
            <span>#${i+1} ${l.name}</span><b>${Math.floor(l.bal)}</b>
        </div>`).join('');
    render(); loop();
}

function loop() {
    if(data.auto > 0) data.bal += (data.auto / 10);
    if(data.energy < data.maxEnergy) data.energy += 0.2;
    document.getElementById('balance').innerText = Math.floor(data.bal);
    document.getElementById('pps').innerText = data.auto.toFixed(1);
    document.getElementById('cur-e').innerText = Math.floor(data.energy);
    document.getElementById('max-e').innerText = data.maxEnergy;
    document.getElementById('energy-fill').style.width = (data.energy / data.maxEnergy * 100) + '%';
    setTimeout(loop, 100);
}

document.getElementById('capy-btn').addEventListener('touchstart', (e) => {
    e.preventDefault();
    if(data.energy < 1) return;
    data.bal += data.click; data.energy -= 1;
    if(Math.floor(data.bal) % 15 === 0) sync();
});

function sync() {
    fetch('/api/sync', { 
        method: 'POST', 
        headers: {'Content-Type': 'application/json'}, 
        body: JSON.stringify({ userId: tg.initDataUnsafe.user.id, bal: data.bal, upCosts: data.upCosts, energy: data.energy, name: tg.initDataUnsafe.user.first_name }) 
    });
}

function render() {
    document.getElementById('shop-list').innerHTML = upgrades.map(u => {
        const cost = data.upCosts[u.id] || u.cost;
        return `<div class="card" style="display:flex; justify-content:space-between" onclick="buy(${u.id})">
            <span>${u.name}</span><button class="buy-btn">${cost}</button>
        </div>`;
    }).join('');
}

function buy(id) {
    const u = upgrades.find(x => x.id === id);
    let cost = data.upCosts[id] || u.cost;
    if(data.bal >= cost) {
        data.bal -= cost;
        if(u.type === 'click') data.click += u.power;
        else data.auto += u.power;
        data.upCosts[id] = Math.floor(cost * 1.6);
        render(); sync();
    } else tg.showAlert("Недостаточно монет!");
}

async function adminAuth() {
    if(tg.initDataUnsafe.user.id != MY_ID) return;
    const pass = prompt("Password:");
    const res = await fetch('/api/admin/verify', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ userId: MY_ID, password: pass }) });
    if(res.ok) {
        sessionStorage.setItem('ak', pass);
        document.getElementById('adm-panel').style.display = 'block';
    }
}

function sendMoney() {
    const amt = document.getElementById('adm-amt').value;
    fetch('/api/admin/action', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ userId: MY_ID, password: sessionStorage.getItem('ak'), type: 'add_money', amount: amt })
    }).then(() => location.reload());
}

function addGiveaway() {
    const prize = document.getElementById('gv-p').value;
    const time = document.getElementById('gv-d').value;
    fetch('/api/admin/action', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ userId: MY_ID, password: sessionStorage.getItem('ak'), type: 'create_giveaway', update: { prize, endTime: time, completed: false } })
    }).then(() => tg.showAlert("Created!"));
}

function resetProgress() {
    if(confirm("Удалить всё?")) {
        data = { bal: 0, click: 1, auto: 0, upCosts: {}, energy: 100, maxEnergy: 100 };
        sync(); location.reload();
    }
}

function tab(id, el) {
    document.querySelectorAll('.modal').forEach(m => m.classList.remove('open'));
    if(id !== 'main') document.getElementById(id).classList.add('open');
}

init();
</script>
</body>
</html>
