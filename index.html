<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Capybara Evolution</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --neon: #00f2ff; --bg: #050505; --pink: #ff007a; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; overflow: hidden; touch-action: none; }
        .container { display: flex; flex-direction: column; align-items: center; justify-content: space-between; height: 100vh; padding: 20px; box-sizing: border-box; }
        
        #balance { font-size: 4em; font-weight: 900; text-shadow: 0 0 15px var(--neon); }
        #level-tag { background: var(--neon); color: #000; padding: 2px 10px; border-radius: 5px; font-weight: bold; font-size: 0.8em; margin-bottom: 5px; }

        /* Кнопка */
        #capy-btn { 
            width: 200px; height: 200px; border-radius: 50%; border: 4px solid #222;
            background: url('https://cdn-icons-png.flaticon.com/512/9308/9308930.png') center/70% no-repeat, #111;
            box-shadow: 0 0 20px rgba(0,242,255,0.1); transition: 0.1s; outline: none;
        }
        #capy-btn:active { transform: scale(0.95); }
        .turbo-mode { box-shadow: 0 0 50px var(--pink) !important; filter: hue-rotate(280deg); }

        .energy-bar { width: 200px; height: 10px; background: #222; border-radius: 10px; margin-top: 15px; overflow: hidden; border: 1px solid #333; }
        #energy-fill { width: 100%; height: 100%; background: linear-gradient(90deg, var(--neon), var(--pink)); transition: 0.2s; }

        /* Навигация */
        .nav { width: 100%; max-width: 400px; display: flex; background: rgba(255,255,255,0.05); border-radius: 20px; padding: 5px; }
        .n-btn { flex: 1; text-align: center; font-size: 1.4em; opacity: 0.4; padding: 10px; transition: 0.3s; }
        .n-btn.active { opacity: 1; color: var(--neon); }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; padding: 20px; z-index: 1000; }
        .modal.open { display: flex; }
        .card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 1px solid #222; }
        
        .floating { position: absolute; pointer-events: none; animation: floatUp 0.5s ease-out forwards; font-weight: 900; color: #fff; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }
        
        #turbo-icon { position: fixed; font-size: 3em; z-index: 2000; cursor: pointer; display: none; }
    </style>
</head>
<body>

<div id="turbo-icon" onclick="activateTurbo()">⚡</div>

<div class="container">
    <div style="text-align: center;">
        <div id="level-tag">LVL 1: НОВИЧОК</div>
        <div id="balance">0</div>
        <div style="color:var(--neon); font-size: 0.8em;">+<span id="pps">0</span>/СЕК</div>
    </div>

    <div style="display:flex; flex-direction:column; align-items:center;">
        <button id="capy-btn"></button>
        <div class="energy-bar"><div id="energy-fill"></div></div>
        <div style="font-size:0.6em; margin-top:5px;"><span id="cur-e">0</span> / <span id="max-e">0</span></div>
    </div>

    <div class="nav">
        <div class="n-btn active" onclick="tab('main', this)">🏠</div>
        <div class="n-btn" onclick="tab('shop', this)">🛒</div>
        <div class="n-btn" onclick="tab('rank', this)">🏆</div>
        <div class="n-btn" onclick="tab('sets', this)">⚙️</div>
    </div>
</div>

<div id="shop" class="modal">
    <div style="display:flex; justify-content:space-between"><h2>МАГАЗИН</h2><h1 onclick="tab('main')">✕</h1></div>
    <div id="shop-list" style="overflow-y:auto"></div>
</div>

<div id="sets" class="modal">
    <div style="display:flex; justify-content:space-between"><h2>ОПЦИИ</h2><h1 onclick="tab('main')">✕</h1></div>
    <div class="card" id="adm-box">
        <button style="width:100%; padding:10px; background:var(--neon); border:none; border-radius:10px; font-weight:bold" onclick="adminAuth()">АДМИН ВХОД</button>
    </div>
</div>

<div id="rank" class="modal">
    <div style="display:flex; justify-content:space-between"><h2>ТОП-10</h2><h1 onclick="tab('main')">✕</h1></div>
    <div id="leader-list"></div>
</div>

<script>
const tg = window.Telegram.WebApp;
const MY_ID = 6675992053;
let data = { bal: 0, click: 1, auto: 0, upCosts: {}, energy: 100, maxEnergy: 100 };
let upgrades = [];
let turbo = false;

// Конфиг уровней
const levels = [
    { threshold: 0, name: "НОВИЧОК" },
    { threshold: 5000, name: "КЛИКЕР" },
    { threshold: 25000, name: "ОПЫТНЫЙ" },
    { threshold: 100000, name: "МАГНАТ" },
    { threshold: 500000, name: "МИЛЛИОНЕР" },
    { threshold: 2000000, name: "КАПИ-БОСС" }
];

// Наполнение магазина
for(let i=1; i<=10; i++) upgrades.push({ id: i, name: `Сила Клика v${i}`, type: 'click', power: i*2, cost: 500*i });
for(let i=11; i<=20; i++) upgrades.push({ id: i, name: `Авто-Сбор v${i-10}`, type: 'auto', power: i, cost: 1000*(i-10) });

async function init() {
    tg.expand();
    const configRes = await fetch('/api/config');
    const config = await configRes.json();

    const syncRes = await fetch('/api/sync', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ userId: tg.initDataUnsafe.user.id, name: tg.initDataUnsafe.user.first_name, isInitial: true })
    });
    const cloud = await syncRes.json();
    
    data.bal = cloud.bal || 0;
    data.upCosts = cloud.upCosts || {};
    
    // Пересчет из базы
    upgrades.forEach(u => {
        if(data.upCosts[u.id]) {
            let count = Math.round(Math.log(data.upCosts[u.id]/u.cost)/Math.log(1.6));
            if(u.type === 'click') data.click += (u.power * count);
            if(u.type === 'auto') data.auto += (u.power * count);
        }
    });

    document.getElementById('leader-list').innerHTML = config.leaders.map((l, i) => `<div class="card">#${i+1} ${l.name}: ${Math.floor(l.bal)}</div>`).join('');
    
    render();
    loop();
    setInterval(spawnTurbo, 45000);
}

function loop() {
    if(data.auto > 0) data.bal += (data.auto / 10);
    if(data.energy < data.maxEnergy) data.energy += 0.3;
    
    // Обновление уровня
    let currentLvl = [...levels].reverse().find(l => data.bal >= l.threshold);
    document.getElementById('level-tag').innerText = `LVL: ${currentLvl.name}`;
    
    document.getElementById('balance').innerText = Math.floor(data.bal);
    document.getElementById('pps').innerText = data.auto.toFixed(1);
    document.getElementById('cur-e').innerText = Math.floor(data.energy);
    document.getElementById('max-e').innerText = data.maxEnergy;
    document.getElementById('energy-fill').style.width = (data.energy / data.maxEnergy * 100) + '%';
    
    setTimeout(loop, 100);
}

document.getElementById('capy-btn').addEventListener('touchstart', (e) => {
    e.preventDefault();
    if(data.energy < 1) return;
    
    let val = turbo ? data.click * 10 : data.click;
    data.bal += val;
    data.energy -= 1;
    
    const f = document.createElement('div');
    f.className = 'floating';
    f.style.left = e.touches[0].clientX + 'px';
    f.style.top = e.touches[0].clientY + 'px';
    f.innerText = `+${val}`;
    document.body.appendChild(f);
    setTimeout(() => f.remove(), 500);
    
    if(Math.floor(data.bal) % 20 === 0) sync();
});

async function sync() {
    fetch('/api/sync', { 
        method: 'POST', 
        headers: {'Content-Type': 'application/json'}, 
        body: JSON.stringify({ userId: tg.initDataUnsafe.user.id, bal: data.bal, upCosts: data.upCosts }) 
    });
}

function render() {
    document.getElementById('shop-list').innerHTML = upgrades.map(u => {
        const cost = data.upCosts[u.id] || u.cost;
        return `<div class="card" style="display:flex; justify-content:space-between" onclick="buy(${u.id})">
            <div><b>${u.name}</b><br><small>+${u.power} бонус</small></div>
            <button style="background:var(--neon); border:none; border-radius:5px; padding:5px 10px">${cost}</button>
        </div>`;
    }).join('');
}

function buy(id) {
    const u = upgrades.find(x => x.id === id);
    let cost = data.upCosts[id] || u.cost;
    if(data.bal >= cost) {
        data.bal -= cost;
        if(u.type === 'click') data.click += u.power;
        else data.auto += u.power;
        data.upCosts[id] = Math.floor(cost * 1.6);
        render();
        sync();
    }
}

async function adminAuth() {
    if(tg.initDataUnsafe.user.id != MY_ID) return;
    const pass = prompt("Пароль:");
    if(pass === "GHG227YYK%%7") {
        document.getElementById('adm-box').innerHTML = `
            <p style="color:var(--neon)">ДОСТУП РАЗРЕШЕН</p>
            <button onclick="giveMoney()" style="width:100%; padding:10px; background:gold; border:none; border-radius:10px; margin-bottom:10px">ВЫДАТЬ 1.000.000</button>
            <button onclick="location.reload()" style="width:100%; padding:10px; background:#333; color:#fff; border:none; border-radius:10px">ВЫХОД</button>
        `;
    }
}

function giveMoney() {
    fetch('/api/admin/action', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ userId: MY_ID, password: "GHG227YYK%%7", type: 'add_money', amount: 1000000 })
    }).then(() => location.reload());
}

function spawnTurbo() {
    const t = document.getElementById('turbo-icon');
    t.style.left = Math.random() * 80 + '%';
    t.style.top = Math.random() * 60 + 20 + '%';
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 7000);
}

function activateTurbo() {
    turbo = true;
    document.getElementById('turbo-icon').style.display = 'none';
    document.getElementById('capy-btn').classList.add('turbo-mode');
    tg.showAlert("🔥 ТУРБО X10 ВКЛЮЧЕН!");
    setTimeout(() => {
        turbo = false;
        document.getElementById('capy-btn').classList.remove('turbo-mode');
    }, 15000);
}

function tab(id, el) {
    document.querySelectorAll('.modal').forEach(m => m.classList.remove('open'));
    if(id !== 'main') document.getElementById(id).classList.add('open');
    if(el) { document.querySelectorAll('.n-btn').forEach(b => b.classList.remove('active')); el.classList.add('active'); }
}

init();
</script>
</body>
</html>
