<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>CapybaraClicker Save Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --main-color: #ffcc00; }
        body { 
            font-family: 'Arial', sans-serif; 
            background: radial-gradient(circle at center, #2c3e50 0%, #000 100%);
            color: white; text-align: center; margin: 0; 
            overflow: hidden; touch-action: none; 
        }
        .container { 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: space-between; height: 100vh; padding: 40px 20px; box-sizing: border-box; 
        }
        #balance { font-size: 5em; font-weight: 900; color: var(--main-color); text-shadow: 0 0 30px rgba(255, 204, 0, 0.4); }
        
        #click-btn { 
            width: 240px; height: 240px; border-radius: 50%; border: 8px solid rgba(255,255,255,0.1);
            background: #5d4037;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            font-size: 100px; cursor: pointer; transition: transform 0.05s;
            display: flex; align-items: center; justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }
        #click-btn::after { content: '🦫'; } /* Вернул капибару */

        .progress-container { width: 100%; background: rgba(255,255,255,0.1); height: 10px; border-radius: 5px; margin: 20px 0; }
        #progress-bar { width: 0%; height: 100%; background: var(--main-color); transition: width 0.3s; }

        .btn { 
            width: 100%; padding: 18px; border-radius: 20px; border: none; font-weight: 800; 
            font-size: 1.1em; cursor: pointer; text-transform: uppercase;
        }
        .upgrade-btn { background: linear-gradient(135deg, #4CAF50, #2E7D32); color: white; }
        
        .floating-text {
            position: absolute; color: white; font-size: 2.5em; font-weight: 900;
            pointer-events: none; animation: float 0.8s ease-out forwards;
            text-shadow: 0 0 10px var(--main-color); z-index: 100;
        }
        @keyframes float { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-150px); } }
    </style>
</head>
<body>
    <div class="container">
        <div id="balance-container">
            <div id="balance">0</div>
            <div class="progress-container"><div id="progress-bar"></div></div>
        </div>

        <button id="click-btn"></button>

        <div style="width: 100%;">
            <div style="margin-bottom: 15px; font-weight: bold; color: var(--main-color);">УРОВЕНЬ: <span id="lvl">1</span></div>
            <button class="btn upgrade-btn" id="upgrade-btn">Прокачать клик: 10</button>
        </div>
    </div>

    <script>
        const webapp = window.Telegram.WebApp;
        webapp.expand();

        let balance = 0;
        let clickPower = 1;
        let upgradeCost = 10;
        let level = 1;

        const balanceEl = document.getElementById('balance');
        const upgradeBtn = document.getElementById('upgrade-btn');
        const clickBtn = document.getElementById('click-btn');
        const progressBar = document.getElementById('progress-bar');
        const lvlEl = document.getElementById('lvl');

        // ЗАГРУЗКА ИЗ ПАМЯТИ ТЕЛЕФОНА
        function loadProgress() {
            const saved = localStorage.getItem('capyData');
            if (saved) {
                const data = JSON.parse(saved);
                balance = data.balance || 0;
                clickPower = data.clickPower || 1;
                upgradeCost = data.upgradeCost || 10;
                level = data.level || 1;
                updateUI();
            }
        }

        // СОХРАНЕНИЕ В ПАМЯТЬ ТЕЛЕФОНА
        function saveProgress() {
            const data = { balance, clickPower, upgradeCost, level };
            localStorage.setItem('capyData', JSON.stringify(data));
        }

        function updateUI() {
            balanceEl.innerText = Math.floor(balance);
            upgradeBtn.innerText = `УЛУЧШИТЬ КЛИК: ${Math.floor(upgradeCost)}`;
            lvlEl.innerText = level;
            let progress = (balance / upgradeCost) * 100;
            progressBar.style.width = Math.min(progress, 100) + '%';
        }

        const handleInteraction = (e) => {
            e.preventDefault();
            const touches = e.changedTouches ? e.changedTouches : [e];
            
            for (let i = 0; i < touches.length; i++) {
                balance += clickPower;
                createFloatingText(touches[i].clientX, touches[i].clientY);
            }

            updateUI();
            saveProgress(); // Сохраняем каждый клик в локалку
            if (webapp.HapticFeedback) webapp.HapticFeedback.impactOccurred('light');
        };

        clickBtn.addEventListener('touchstart', handleInteraction, {passive: false});
        clickBtn.addEventListener('mousedown', handleInteraction);

        function createFloatingText(x, y) {
            const text = document.createElement('div');
            text.className = 'floating-text';
            text.innerText = `+${clickPower}`;
            text.style.left = `${x - 30}px`;
            text.style.top = `${y - 30}px`;
            document.body.appendChild(text);
            setTimeout(() => text.remove(), 800);
        }

        upgradeBtn.addEventListener('click', () => {
            if (balance >= upgradeCost) {
                balance -= upgradeCost;
                clickPower += 1;
                level += 1;
                upgradeCost *= 2;
                updateUI();
                saveProgress();
                webapp.HapticFeedback.notificationOccurred('success');
            } else {
                webapp.showAlert('Мало монет!');
            }
        });

        // Старт
        loadProgress();
    </script>
</body>
</html>
