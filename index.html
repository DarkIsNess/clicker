<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Rouge Clicker</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f0f0f; color: #fff; text-align: center; margin: 0; overflow: hidden; }
        .container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #balance { font-size: 3.5em; font-weight: bold; margin-bottom: 10px; color: #00d2ff; text-shadow: 0 0 20px #00d2ff; }
        #click-btn { width: 200px; height: 200px; border-radius: 50%; border: 8px solid #333; background: radial-gradient(circle, #1c9cda 0%, #074a6b 100%); cursor: pointer; box-shadow: 0 0 30px rgba(28, 156, 218, 0.5); transition: transform 0.05s; }
        #click-btn:active { transform: scale(0.92); border-color: #00d2ff; }
        .stats { margin-top: 20px; font-size: 1.2em; opacity: 0.8; }
        .shop-btn { margin-top: 30px; padding: 12px 25px; background: #333; border: 1px solid #444; color: white; border-radius: 12px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="stats">БАЛАНС</div>
        <div id="balance">0</div>
        <button id="click-btn"></button>
        <div class="stats" id="per-click">За клик: +1</div>
        <button class="shop-btn" id="upgrade-btn">УЛУЧШИТЬ (Цена: 10)</button>
    </div>

    <script>
        const webapp = window.Telegram.WebApp;
        webapp.expand();
        webapp.ready();

        let balance = 0;
        let clickPower = 1;
        let upgradeCost = 10;
