<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Capybara Giveaway Engine</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #ffcc00; --bg: #0d0d0d; --neon: #00e5ff; --danger: #ff4444; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; overflow: hidden; touch-action: none; }
        .container { display: flex; flex-direction: column; align-items: center; justify-content: space-between; height: 100vh; padding: 20px; box-sizing: border-box; }
        #balance { font-size: 4em; font-weight: 900; color: var(--gold); }
        #capy-btn { width: 220px; height: 220px; border-radius: 50%; background: radial-gradient(circle, #3d2b1f, #1a110a); border: 4px solid #333; font-size: 90px; display: flex; align-items: center; justify-content: center; transition: 0.05s; outline: none; -webkit-tap-highlight-color: transparent; }
        #capy-btn:active { transform: scale(0.95); }
        .nav { width: 100%; background: #1a1a1a; display: flex; padding: 15px; border-radius: 20px; }
        .n-btn { flex: 1; text-align: center; font-size: 1.4em; opacity: 0.5; }
        .n-btn.active { opacity: 1; color: var(--gold); }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); display: none; flex-direction: column; padding: 20px; box-sizing: border-box; z-index: 100; overflow-y: auto; }
        .modal.open { display: flex; }
        .card { background: #151515; padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 1px solid #222; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-gold { background: var(--gold); color: black; }
        .btn-admin { background: #333; color: var(--neon); margin-top: 10px; }
        .floating { position: absolute; pointer-events: none; animation: up 0.7s forwards; font-weight: bold; font-size: 2em; }
        @keyframes up { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
<body>

<div class="container">
    <div style="text-align: center;">
        <div id="balance">0</div>
        <div id="pps" style="color: var(--neon); font-size: 0.9em;">+0/сек</div>
    </div>

    <button id="capy-btn">🦫</button>

    <div class="nav">
        <div class="n-btn active" onclick="tab('main', this)">🏠</div>
        <div class="n-btn" onclick="tab('shop', this)">🛒</div>
        <div class="n-btn" onclick="tab('give', this)">🎁</div>
        <div class="n-btn" onclick="tab('sets', this)">⚙️</div>
    </div>
</div>

<div id="shop" class="modal">
    <div style="display:flex; justify-content:space-between;"><h2>МАГАЗИН</h2><h2 onclick="tab('main')">✖</h2></div>
    <div id="shop-list"></div>
</div>

<div id="give" class="modal">
    <div style="display:flex; justify-content:space-between;"><h2>РОЗЫГРЫШИ</h2><h2 onclick="tab('main')">✖</h2></div>
    <div id="admin-give-panel" style="display:none;">
        <div class="card" style="border-color: var(--neon);">
            <h4>➕ Создать розыгрыш</h4>
            <input id="gv-prize" placeholder="Описание приза (напр. 50,000 монет)">
            <input id="gv-date" type="datetime-local">
            <button class="btn btn-gold" onclick="createGiveaway()">ЗАПЛАНИРОВАТЬ</button>
        </div>
    </div>
    <div id="give-list"></div>
</div>

<div id="sets" class="modal">
    <h2>НАСТРОЙКИ</h2>
    <button class="btn" style="background:red; color:white;" onclick="localStorage.clear(); location.reload();">СБРОСИТЬ ПРОГРЕСС</button>
    <button class="btn btn-admin" id="admin-login-btn" onclick="adminLogin()">ВОЙТИ КАК АДМИН</button>
    <button class="btn" style="margin-top:10px" onclick="tab('main')">НАЗАД</button>
</div>

<script>
const tg = window.Telegram.WebApp;
const ADMIN_ID = 6675992053;
const ADMIN_PASS = "GHG227YYK%%7";
tg.expand();

let data = { bal: 0, click: 1, auto: 0, combo: 1, cFill: 0, upCosts: {} };
let upgrades = [];
let isAdmin = false;

for(let i=1; i<=30; i++) {
    upgrades.push({ id: i, name: i<=15 ? `Буст клика ${i}` : `Ферма ${i-15}`, type: i<=15 ? 'click' : 'auto', power: i*2, cost: i*25 });
}

async function init() {
    try {
        const res = await fetch('/api/config');
        const config = await res.json();
        
        // Применяем цены
        upgrades.forEach(u => {
            if(config.upgrades[u.id]) { u.name = config.upgrades[u.id].name; u.cost = config.upgrades[u.id].cost; }
        });

        // Проверка админа
        if(tg.initDataUnsafe.user?.id === ADMIN_ID) {
            document.getElementById('admin-give-panel').style.display = 'block';
            isAdmin = true;
        }

        // Список розыгрышей
        const gList = document.getElementById('give-list');
        gList.innerHTML = config.giveaways.map(g => `
            <div class="card">
                <b>🎁 Приз: ${g.prize}</b><br>
                <small>Завершится: ${new Date(g.endTime).toLocaleString()}</small>
            </div>
        `).join('');

    } catch(e) {}

    const saved = localStorage.getItem('capy_v5');
    if(saved) data = JSON.parse(saved);
    renderShop();
    loop();
}

function loop() {
    if(data.cFill > 0) data.cFill -= 0.3;
    if(data.auto > 0) data.bal += (data.auto / 10);
    document.getElementById('balance').innerText = Math.floor(data.bal);
    document.getElementById('pps').innerText = `+${data.auto}/сек`;
    localStorage.setItem('capy_v5', JSON.stringify(data));
    setTimeout(loop, 100);
}

document.getElementById('capy-btn').addEventListener('touchstart', (e) => {
    e.preventDefault();
    data.bal += data.click;
    const n = document.createElement('div');
    n.className = 'floating'; n.style.left = e.touches[0].clientX + 'px'; n.style.top = e.touches[0].clientY + 'px';
    n.innerText = `+${data.click}`; document.body.appendChild(n);
    setTimeout(() => n.remove(), 700);
    tg.HapticFeedback.impactOccurred('light');
});

function renderShop() {
    document.getElementById('shop-list').innerHTML = upgrades.map(u => {
        const cost = data.upCosts[u.id] || u.cost;
        return `
            <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                <div><b>${u.name}</b><br><small>+${u.power} бонус</small></div>
                <button class="btn btn-gold" style="width:auto; padding:8px 15px;" 
                    onclick="buy(${u.id})" oncontextmenu="adminEdit(${u.id}); return false;">${cost}</button>
            </div>
        `;
    }).join('');
}

function buy(id) {
    const u = upgrades.find(x => x.id === id);
    let cost = data.upCosts[id] || u.cost;
    if(data.bal >= cost) {
        data.bal -= cost;
        if(u.type === 'click') data.click += u.power; else data.auto += u.power;
        data.upCosts[id] = Math.floor(cost * 1.5);
        renderShop();
    } else { tg.showAlert("Мало монет!"); }
}

function adminEdit(id) {
    if(!isAdmin) return;
    const nName = prompt("Новое имя:");
    const nCost = prompt("Глобальная цена:");
    if(nName && nCost) {
        adminRequest({ type: 'upgrade', id: id, name: nName, cost: nCost });
    }
}

function createGiveaway() {
    const prize = document.getElementById('gv-prize').value;
    const time = document.getElementById('gv-date').value;
    if(!prize || !time) return tg.showAlert("Заполни все поля!");
    adminRequest({ type: 'giveaway', data: { prize, endTime: time, completed: false } });
}

function adminRequest(update) {
    fetch('/api/admin/update', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ userId: ADMIN_ID, password: ADMIN_PASS, update })
    }).then(() => location.reload());
}

function tab(id, el) {
    document.querySelectorAll('.modal').forEach(m => m.classList.remove('open'));
    if(id !== 'main') document.getElementById(id).classList.add('open');
    if(el) {
        document.querySelectorAll('.n-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }
}

init();
</script>
</body>
</html>
